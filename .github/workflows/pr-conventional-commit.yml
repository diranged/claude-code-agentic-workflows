name: "Conventional Commit Check"

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5f9c90f9c6 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            test
            chore
            refactor
            ci
          scopes: |
            claude-core
            claude-respond
            claude-engineer
            claude-report
            docs
            workflows
            agents
          requireScope: false
          subjectPattern: ^[a-z].+$
          subjectPatternError: "PR title must start with a lowercase letter"
