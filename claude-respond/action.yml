name: "Claude Respond"
description: "Interactive Claude assistant for issues and PRs. Handles trigger validation, checkout, tracking, label routing, Claude execution, and reporting."
branding:
  icon: "message-circle"
  color: "orange"

inputs:
  # Auth — at least one Claude auth method required
  claude_code_oauth_token:
    description: "Claude Code OAuth token (from `claude setup-token`). Preferred — uses subscription billing."
    required: false
  anthropic_api_key:
    description: "Anthropic API key. Fallback — uses per-token billing."
    required: false

  # GitHub auth — optional GitHub App, falls back to github.token
  github_token:
    description: "GitHub token. If not provided and no App credentials, falls back to the workflow's GITHUB_TOKEN."
    required: false
  app_id:
    description: "GitHub App ID for generating an installation token with elevated permissions."
    required: false
  app_private_key:
    description: "GitHub App private key (PEM format) for generating an installation token."
    required: false

  # Bot configuration
  allowed_bots:
    description: "Comma-separated list of allowed bot usernames, or '*' to allow all bots. Empty (default) allows no bots."
    required: false
    default: ""

  # Trigger configuration
  trigger_phrase:
    description: "Phrase that triggers Claude in comments."
    required: false
    default: "@claude"
  assignee_trigger:
    description: "Username that triggers Claude when assigned to an issue."
    required: false
  label_trigger:
    description: "Label that triggers Claude when applied to an issue/PR."
    required: false

  # Claude configuration
  model:
    description: "Claude model to use (e.g., claude-sonnet-4-20250514). Passed via --model flag."
    required: false
  max_turns:
    description: "Maximum agentic turns per invocation. Passed via --max-turns flag."
    required: false
  timeout_minutes:
    description: "Timeout in minutes for the Claude Code process. Passed via --timeout flag."
    required: false
    default: "60"
  allowed_tools:
    description: "Comma-separated list of allowed tools. Passed via --allowedTools flag."
    required: false
  disallowed_tools:
    description: "Comma-separated list of disallowed tools. Passed via --disallowedTools flag."
    required: false

  # Advanced configuration
  claude_args:
    description: "Additional arguments passed directly to Claude CLI. Multiline supported."
    required: false
  additional_permissions:
    description: "Additional GitHub permissions to request (e.g., 'actions: read')."
    required: false
  settings:
    description: "Claude Code settings as JSON string or path to settings JSON file."
    required: false
  prompt:
    description: "Text to send to Claude as the prompt."
    required: false

  # Compose prompt configuration
  agent_name:
    description: "Agent to load from agents/ directory (e.g., 'agentic-designer')"
    required: false
  extra_instructions_path:
    description: "Additional directory of instruction files to load (after base, before user overrides)."
    required: false
  extra_agents_path:
    description: "Additional directory to search for agent definitions (checked before built-in agents)."
    required: false
  compose_prompt:
    description: "Compose prompt from instructions/skills/agent (true/false)"
    required: false
    default: "false"
  issue_comment_id:
    description: "Tracking comment ID for progress updates"
    required: false
  notify_owners:
    description: "Comma-separated GitHub usernames to assign when the agent needs human input."
    required: false

  display_report:
    description: "Show the full Claude Code Report in GitHub Job Summary."
    required: false
    default: "true"
  dry_run:
    description: "Validate inputs and compose prompts without invoking Claude (true/false)."
    required: false
    default: "false"

  # --- Orchestration inputs (not in claude-core) ---
  pre_run:
    description: "Shell commands to run after checkout but before Claude. Caller env vars are available."
    required: false
    default: ""
  tracking_comment:
    description: "Create a tracking comment for progress updates (true/false)."
    required: false
    default: "true"
  reaction_emoji:
    description: "Emoji to react with on the triggering comment."
    required: false
    default: "rocket"
  checkout:
    description: "Whether to checkout the repository (true/false)."
    required: false
    default: "true"
  checkout_ref:
    description: "Git ref to checkout. Defaults to the event's default ref."
    required: false
    default: ""
  checkout_fetch_depth:
    description: "Fetch depth for checkout."
    required: false
    default: "1"
  default_agent:
    description: "Default agent for label routing when label doesn't match a known pipeline stage."
    required: false
    default: "agentic-designer"

outputs:
  execution_file:
    description: "Path to the Claude Code execution output file"
    value: ${{ steps.core.outputs.execution_file }}
  branch_name:
    description: "The branch created by Claude Code for this execution"
    value: ${{ steps.core.outputs.branch_name }}
  session_id:
    description: "Claude Code session ID for resuming conversations"
    value: ${{ steps.core.outputs.session_id }}
  skipped:
    description: "Whether the run was skipped by trigger validation (true/false)"
    value: ${{ steps.setup.outputs.skip }}

runs:
  using: "composite"
  steps:
    # Step 1: Pre-Claude orchestration (trigger validation, tracking, checkout, pre_run)
    - name: Setup
      id: setup
      uses: diranged/claude-code-agentic-workflows/claude-setup@main
      with:
        trigger_phrase: ${{ inputs.trigger_phrase }}
        assignee_trigger: ${{ inputs.assignee_trigger }}
        label_trigger: ${{ inputs.label_trigger }}
        tracking_comment: ${{ inputs.tracking_comment }}
        reaction_emoji: ${{ inputs.reaction_emoji }}
        checkout: ${{ inputs.checkout }}
        checkout_ref: ${{ inputs.checkout_ref }}
        checkout_fetch_depth: ${{ inputs.checkout_fetch_depth }}
        pre_run: ${{ inputs.pre_run }}
        github_token: ${{ inputs.github_token }}
        app_id: ${{ inputs.app_id }}
        app_private_key: ${{ inputs.app_private_key }}

    # Step 2: Route label to agent/model (only for label-triggered events)
    - name: Detect intent
      id: intent
      if: >-
        steps.setup.outputs.skip != 'true'
        && inputs.label_trigger != ''
        && github.event_name == 'issues'
        && github.event.action == 'labeled'
      shell: bash
      run: ${{ github.action_path }}/scripts/detect_intent.sh
      env:
        LABEL_NAME: ${{ github.event.label.name }}
        DEFAULT_AGENT: ${{ inputs.default_agent || inputs.agent_name }}
        DEFAULT_MODEL: ${{ inputs.model }}

    # Step 3: Run Claude via claude-core
    - name: Run Claude Core
      id: core
      if: steps.setup.outputs.skip != 'true' && steps.intent.outputs.skip != 'true'
      uses: diranged/claude-code-agentic-workflows/claude-core@main
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        anthropic_api_key: ${{ inputs.anthropic_api_key }}
        github_token: ${{ steps.setup.outputs.github_token || inputs.github_token }}
        app_id: ${{ inputs.app_id }}
        app_private_key: ${{ inputs.app_private_key }}
        allowed_bots: ${{ inputs.allowed_bots }}
        trigger_phrase: ${{ inputs.trigger_phrase }}
        assignee_trigger: ${{ inputs.assignee_trigger }}
        label_trigger: ${{ inputs.label_trigger }}
        model: ${{ steps.intent.outputs.model || inputs.model }}
        max_turns: ${{ inputs.max_turns }}
        timeout_minutes: ${{ inputs.timeout_minutes }}
        allowed_tools: ${{ inputs.allowed_tools }}
        disallowed_tools: ${{ inputs.disallowed_tools }}
        claude_args: ${{ inputs.claude_args }}
        additional_permissions: ${{ inputs.additional_permissions }}
        settings: ${{ inputs.settings }}
        prompt: ${{ inputs.prompt }}
        agent_name: ${{ steps.intent.outputs.agent || inputs.agent_name }}
        extra_instructions_path: ${{ inputs.extra_instructions_path }}
        extra_agents_path: ${{ inputs.extra_agents_path }}
        compose_prompt: ${{ inputs.compose_prompt }}
        issue_comment_id: ${{ steps.setup.outputs.comment_id || inputs.issue_comment_id }}
        notify_owners: ${{ inputs.notify_owners }}
        display_report: ${{ inputs.display_report }}
        dry_run: ${{ inputs.dry_run }}

    # Step 4: Generate report and upload artifact
    - name: Generate Report
      if: always() && steps.setup.outputs.skip != 'true' && steps.intent.outputs.skip != 'true'
      uses: diranged/claude-code-agentic-workflows/claude-report@main
      with:
        execution_file: ${{ steps.core.outputs.execution_file }}
        session_id: ${{ steps.core.outputs.session_id }}
        outcome: ${{ steps.core.outcome }}
