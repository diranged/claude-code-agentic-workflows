name: "Claude Engineers"

on:
  issues:
    types: [labeled]
  pull_request:
    types: [closed]
  repository_dispatch:
    types: [claude-dequeue]
  workflow_run:
    workflows: ["Tests", "Conventional Commit Check"]
    types: [completed]

jobs:
  # Label-triggered: route claude:* labels to the appropriate agent
  engineers:
    if: >-
      github.event_name == 'issues'
      && github.event.action == 'labeled'
      && !github.event.issue.pull_request
      && startsWith(github.event.label.name, 'claude:')
    uses: ./.github/workflows/shared-claude-engineers.yml
    with:
      runner: diranged-claude-code
      notify_owners: "diranged"
      max_implementations: "2"
      allowed_tools: "Bash(*),Read,Glob,Grep,Edit,Write,WebFetch,WebSearch"
    secrets:
      claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}

  # Dequeue-implement: run implementation for a dispatch-promoted issue
  dequeue-implement:
    if: >-
      github.event_name == 'repository_dispatch'
      && github.event.action == 'claude-dequeue'
    uses: ./.github/workflows/shared-claude-engineers.yml
    with:
      runner: diranged-claude-code
      notify_owners: "diranged"
      max_implementations: "2"
      allowed_tools: "Bash(*),Read,Glob,Grep,Edit,Write,WebFetch,WebSearch"
      issue_number: "${{ github.event.client_payload.issue_number }}"
      label_name: "${{ github.event.client_payload.label_prefix }}:implement"
    secrets:
      claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}

  # Dequeue: when a PR is closed/merged, check for queued issues and fire dispatches
  dequeue:
    if: >-
      github.event_name == 'pull_request'
      && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: read
    steps:
      - name: Promote queued issues via dispatch
        env:
          GH_TOKEN: ${{ github.token }}
          MAX_IMPL: "2"
          LABEL_PREFIX: "claude"
        run: |
          set -euo pipefail

          # Count current implementations
          IMPL_ISSUES=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "${LABEL_PREFIX}:implement" \
            --state open \
            --json number \
            --jq 'length')

          CLAUDE_PRS=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --json number,author \
            --jq '[.[] | select(.author.login | test("claude|\\[bot\\]"))] | length')

          TOTAL=$((IMPL_ISSUES + CLAUDE_PRS))
          echo "Current slots: ${TOTAL}/${MAX_IMPL}"

          if [ "$TOTAL" -ge "$MAX_IMPL" ]; then
            echo "No slots available, skipping dequeue"
            exit 0
          fi

          SLOTS_AVAILABLE=$((MAX_IMPL - TOTAL))

          # Find oldest queued issues, promote up to available slots
          QUEUED=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "${LABEL_PREFIX}:queued" \
            --state open \
            --json number,createdAt \
            --jq 'sort_by(.createdAt) | .[].number')

          if [ -z "$QUEUED" ]; then
            echo "No queued issues to promote"
            exit 0
          fi

          PROMOTED=0
          for ISSUE_NUM in $QUEUED; do
            if [ "$PROMOTED" -ge "$SLOTS_AVAILABLE" ]; then
              break
            fi

            echo "Promoting issue #${ISSUE_NUM} from queue"

            # Swap labels for tracking
            gh issue edit "$ISSUE_NUM" \
              --repo "${{ github.repository }}" \
              --remove-label "${LABEL_PREFIX}:queued" \
              --add-label "${LABEL_PREFIX}:implement"

            # Fire repository_dispatch to trigger implementation
            echo "{\"event_type\":\"claude-dequeue\",\"client_payload\":{\"issue_number\":\"${ISSUE_NUM}\",\"label_prefix\":\"${LABEL_PREFIX}\"}}" | \
              gh api "repos/${{ github.repository }}/dispatches" --method POST --input -

            gh issue comment "$ISSUE_NUM" \
              --repo "${{ github.repository }}" \
              --body "Slot available — promoting from queue to implementation."

            PROMOTED=$((PROMOTED + 1))
          done

          echo "Promoted ${PROMOTED} issue(s) from queue"
        shell: bash

  # CI retry: re-trigger developer when CI fails on a Claude-authored PR
  ci-retry:
    if: >-
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'failure'
    uses: ./.github/workflows/shared-claude-engineers.yml
    with:
      runner: diranged-claude-code
      ci_retry: "true"
      ci_retry_max: "3"
    secrets:
      claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
