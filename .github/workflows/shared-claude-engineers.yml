name: "Shared: Claude Engineers"

# Reusable workflow for handling claude:* label triggers on issues.
# Implements the design -> implement -> CI-retry lifecycle.
#
# Required caller permissions (must be granted by the calling job):
#   contents: write, issues: write, pull-requests: write, id-token: write
#
# Example caller:
#   on:
#     issues:
#       types: [labeled]
#     workflow_run:
#       workflows: ["Tests"]
#       types: [completed]
#   jobs:
#     engineers:
#       if: >-
#         github.event_name == 'issues'
#         && github.event.action == 'labeled'
#         && !github.event.issue.pull_request
#         && startsWith(github.event.label.name, 'claude:')
#       permissions:
#         contents: write
#         issues: write
#         pull-requests: write
#         id-token: write
#       uses: diranged/claude-code-agentic-workflows/.github/workflows/shared-claude-engineers.yml@v0
#       with:
#         runner: my-self-hosted-runner
#       secrets:
#         claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
#
#     ci-retry:
#       if: >-
#         github.event_name == 'workflow_run'
#         && github.event.workflow_run.conclusion == 'failure'
#       permissions:
#         contents: write
#         issues: write
#         pull-requests: write
#         id-token: write
#       uses: diranged/claude-code-agentic-workflows/.github/workflows/shared-claude-engineers.yml@v0
#       with:
#         runner: my-self-hosted-runner
#         ci_retry: "true"
#         ci_retry_max: "3"
#       secrets:
#         claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}

on:
  workflow_call:
    inputs:
      # Runner configuration
      runner:
        description: "Runner label for the Claude execution job"
        type: string
        required: true

      # Label-to-agent routing
      label_prefix:
        description: "Label prefix that triggers this workflow (e.g., 'claude')"
        type: string
        default: "claude"
      implement_agent:
        description: "Agent for the implement label"
        type: string
        default: "agentic-developer"
      implement_model:
        description: "Model for the implement label"
        type: string
        default: "claude-sonnet-4-20250514"
      design_agent:
        description: "Agent for the design label"
        type: string
        default: "agentic-designer"
      design_model:
        description: "Model for the design label"
        type: string
        default: "claude-opus-4-20250514"
      review_agent:
        description: "Agent for the review label"
        type: string
        default: "architect"
      review_model:
        description: "Model for the review label"
        type: string
        default: "claude-opus-4-20250514"
      default_agent:
        description: "Agent for unknown labels matching the prefix"
        type: string
        default: "agentic-designer"
      default_model:
        description: "Model for unknown labels matching the prefix"
        type: string
        default: "claude-opus-4-20250514"

      # CI retry configuration
      ci_retry:
        description: "Enable CI retry mode (set to 'true' when called from workflow_run)"
        type: string
        default: "false"
      ci_retry_max:
        description: "Maximum number of CI retry attempts before escalating"
        type: string
        default: "3"

      # Trigger configuration
      trigger_phrase:
        description: "Phrase that triggers Claude in comments (used by CI retry)"
        type: string
        default: "@claude"
      allowed_bots:
        description: "Comma-separated bot usernames allowed to trigger, or '*' for all"
        type: string
        default: "claude[bot]"

      # Notification
      notify_owners:
        description: "Comma-separated GitHub usernames to notify when human input needed"
        type: string
        default: ""

      # Agent configuration
      compose_prompt:
        description: "Compose prompt from instructions/skills/agent"
        type: string
        default: "true"
      max_turns:
        description: "Maximum agentic turns per invocation"
        type: string
        default: ""
      timeout_minutes:
        description: "Timeout in minutes for Claude Code process"
        type: string
        default: "60"

      # Tool configuration
      allowed_tools:
        description: "Comma-separated list of allowed tools"
        type: string
        default: ""
      disallowed_tools:
        description: "Comma-separated list of disallowed tools"
        type: string
        default: ""

      # Advanced Claude configuration
      claude_args:
        description: "Additional arguments passed directly to Claude CLI"
        type: string
        default: ""
      settings:
        description: "Claude Code settings as JSON string or path to settings file"
        type: string
        default: ""
      additional_permissions:
        description: "Additional GitHub permissions to request"
        type: string
        default: ""
      extra_instructions_path:
        description: "Additional directory of instruction files to load"
        type: string
        default: ""
      extra_agents_path:
        description: "Additional directory to search for agent definitions"
        type: string
        default: ""

      # Reporting
      display_report:
        description: "Show full Claude Code Report in GitHub Job Summary"
        type: string
        default: "true"
      dry_run:
        description: "Validate inputs and compose prompts without invoking Claude"
        type: string
        default: "false"

      # UX configuration
      tracking_comment:
        description: "Create a tracking comment for progress updates (true/false)"
        type: string
        default: "true"
      reaction_emoji:
        description: "Emoji to react with on triggering comment"
        type: string
        default: "rocket"

    secrets:
      claude_code_oauth_token:
        description: "Claude Code OAuth token (subscription billing)"
        required: false
      anthropic_api_key:
        description: "Anthropic API key (per-token billing)"
        required: false
      app_id:
        description: "GitHub App ID for elevated permissions"
        required: false
      app_private_key:
        description: "GitHub App private key (PEM format)"
        required: false

jobs:
  # Job 1: Route label to agent/model and handle CI retry
  detect-intent:
    runs-on: ubuntu-latest
    if: inputs.ci_retry != 'true'
    outputs:
      agent: ${{ steps.route.outputs.agent }}
      model: ${{ steps.route.outputs.model }}
      issue_number: ${{ steps.route.outputs.issue_number }}
    steps:
      - name: Route label to agent
        id: route
        env:
          LABEL: ${{ github.event.label.name }}
          LABEL_PREFIX: ${{ inputs.label_prefix }}
        run: |
          echo "issue_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"

          suffix="${LABEL#"${LABEL_PREFIX}:"}"
          case "$suffix" in
            implement)
              echo "agent=${{ inputs.implement_agent }}" >> "$GITHUB_OUTPUT"
              echo "model=${{ inputs.implement_model }}" >> "$GITHUB_OUTPUT"
              ;;
            design)
              echo "agent=${{ inputs.design_agent }}" >> "$GITHUB_OUTPUT"
              echo "model=${{ inputs.design_model }}" >> "$GITHUB_OUTPUT"
              ;;
            review)
              echo "agent=${{ inputs.review_agent }}" >> "$GITHUB_OUTPUT"
              echo "model=${{ inputs.review_model }}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "agent=${{ inputs.default_agent }}" >> "$GITHUB_OUTPUT"
              echo "model=${{ inputs.default_model }}" >> "$GITHUB_OUTPUT"
              ;;
          esac
        shell: bash

  # Job 2: Create a tracking comment
  setup:
    runs-on: ubuntu-latest
    needs: [detect-intent]
    if: inputs.ci_retry != 'true'
    permissions:
      issues: write
      pull-requests: write
    outputs:
      comment_id: ${{ steps.create-comment.outputs.comment_id }}
    steps:
      - name: Create tracking comment
        id: create-comment
        if: inputs.tracking_comment == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ needs.detect-intent.outputs.issue_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY='<div data-claude-tracking-comment hidden></div>'
          BODY="${BODY}"$'\n'"## Status: Initializing"
          BODY="${BODY}"$'\n\n'"**Run:** [View workflow run](${RUN_URL})"
          BODY="${BODY}"$'\n\n'"Claude is initializing..."
          COMMENT_ID=$(gh api \
            --method POST \
            "/repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments" \
            -f body="${BODY}" \
            --jq '.id')
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"
        shell: bash

  # Job 3: Run Claude with the routed agent
  claude-run:
    runs-on: ${{ inputs.runner }}
    needs: [detect-intent, setup]
    if: inputs.ci_retry != 'true'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Claude
        uses: diranged/claude-code-agentic-workflows/claude-respond@main
        with:
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          app_id: ${{ secrets.app_id }}
          app_private_key: ${{ secrets.app_private_key }}
          trigger_phrase: ${{ inputs.trigger_phrase }}
          label_trigger: ${{ inputs.label_prefix }}
          allowed_bots: ${{ inputs.allowed_bots }}
          notify_owners: ${{ inputs.notify_owners }}
          compose_prompt: ${{ inputs.compose_prompt }}
          agent_name: ${{ needs.detect-intent.outputs.agent }}
          model: ${{ needs.detect-intent.outputs.model }}
          max_turns: ${{ inputs.max_turns }}
          timeout_minutes: ${{ inputs.timeout_minutes }}
          allowed_tools: ${{ inputs.allowed_tools }}
          disallowed_tools: ${{ inputs.disallowed_tools }}
          claude_args: ${{ inputs.claude_args }}
          settings: ${{ inputs.settings }}
          additional_permissions: ${{ inputs.additional_permissions }}
          extra_instructions_path: ${{ inputs.extra_instructions_path }}
          extra_agents_path: ${{ inputs.extra_agents_path }}
          display_report: ${{ inputs.display_report }}
          dry_run: ${{ inputs.dry_run }}
          issue_comment_id: ${{ needs.setup.outputs.comment_id }}
  # Job 4: CI retry — re-trigger developer when CI fails on a Claude-authored PR
  ci-retry:
    runs-on: ubuntu-latest
    if: inputs.ci_retry == 'true'
    permissions:
      issues: write
      pull-requests: read
      contents: read
    steps:
      - name: Check Claude PR and retry
        env:
          GH_TOKEN: ${{ github.token }}
          MAX_RETRIES: ${{ inputs.ci_retry_max }}
        run: |
          set -euo pipefail

          # Get PR from workflow run
          PR_NUMBER=$(echo '${{ toJson(github.event.workflow_run.pull_requests) }}' | jq -r '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR associated with this workflow run"
            exit 0
          fi

          # Check if PR was authored by Claude
          PR_AUTHOR=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json author --jq '.author.login')
          case "$PR_AUTHOR" in
            *claude*|*\[bot\]*) ;;
            *)
              echo "PR #$PR_NUMBER not authored by Claude (author: $PR_AUTHOR), skipping"
              exit 0
              ;;
          esac

          # Find linked issue from PR body (looks for "Closes #N")
          ISSUE_NUMBER=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json body --jq '.body' | grep -oE 'Closes #[0-9]+' | head -1 | grep -oE '[0-9]+')
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No linked issue found in PR #$PR_NUMBER body"
            exit 0
          fi

          # Count commits as retry gauge
          COMMIT_COUNT=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json commits --jq '.commits | length')
          echo "PR #$PR_NUMBER has $COMMIT_COUNT commits (max retries: $MAX_RETRIES)"

          if [ "$COMMIT_COUNT" -gt "$MAX_RETRIES" ]; then
            echo "Exceeded max retries, escalating to humans"
            gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" \
              --body "CI has failed after $COMMIT_COUNT attempts on PR #$PR_NUMBER. Auto-fix limit reached. Human review needed.

          **Failed run:** ${{ github.event.workflow_run.html_url }}"
            exit 0
          fi

          # Post @claude comment to re-trigger the developer agent
          gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" \
            --body "${{ inputs.trigger_phrase }} implement — CI failed on PR #$PR_NUMBER (attempt $COMMIT_COUNT/$MAX_RETRIES). Fix the failing checks.

          **Failed run:** ${{ github.event.workflow_run.html_url }}"
        shell: bash
