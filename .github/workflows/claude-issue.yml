name: "Claude Issue Agent"

on:
  issue_comment:
    types: [created]
  issues:
    types: [assigned, labeled]
  pull_request_review_comment:
    types: [created]
  workflow_run:
    workflows: ["Tests", "Conventional Commit Check"]
    types: [completed]

jobs:
  # Job 1: Determine if we should run and which agent to use
  detect-intent:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'issue_comment'
        && github.event.sender.type != 'Bot'
        && contains(github.event.comment.body, '@claude'))
      || (github.event_name == 'pull_request_review_comment'
        && github.event.sender.type != 'Bot'
        && contains(github.event.comment.body, '@claude'))
      || (github.event_name == 'issues' && github.event.action == 'assigned'
        && !github.event.issue.pull_request)
      || (github.event_name == 'issues' && github.event.action == 'labeled'
        && !github.event.issue.pull_request
        && startsWith(github.event.label.name, 'claude:'))
      || (github.event_name == 'workflow_run')
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}
      agent: ${{ steps.detect.outputs.agent }}
      model: ${{ steps.detect.outputs.model }}
      issue_number: ${{ steps.detect.outputs.issue_number }}
    steps:
      - name: Checkout intent detection script
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          sparse-checkout: claude-core/scripts/
          sparse-checkout-cone-mode: false

      - name: Detect intent
        id: detect
        env:
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
          TRIGGER_LABEL: ${{ github.event.label.name || '' }}
        run: |
          # issue_comment uses issue.number (works for both issues and PRs)
          # pull_request_review_comment uses pull_request.number
          # workflow_run is handled by ci-retry job separately
          ISSUE_NUM="${{ github.event.issue.number || github.event.pull_request.number || '' }}"
          echo "issue_number=${ISSUE_NUM}" >> "$GITHUB_OUTPUT"
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          bash claude-core/scripts/detect_intent.sh
        shell: bash

  # Job 2: React to the trigger and create a tracking comment
  setup:
    runs-on: ubuntu-latest
    needs: detect-intent
    if: needs.detect-intent.outputs.should_run == 'true'
    permissions:
      issues: write
      pull-requests: write
    outputs:
      comment_id: ${{ steps.create-comment.outputs.comment_id }}
    steps:
      - name: Add reaction to triggering comment
        if: github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment'
        run: |
          gh api \
            --method POST \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='rocket'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash

      - name: Create tracking comment
        id: create-comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.detect-intent.outputs.issue_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY='<div data-claude-tracking-comment hidden></div>'
          BODY="${BODY}"$'\n'"## Status: Initializing"
          BODY="${BODY}"$'\n\n'"**Run:** [View workflow run](${RUN_URL})"
          BODY="${BODY}"$'\n\n'"Claude is initializing..."
          COMMENT_ID=$(gh api \
            --method POST \
            "/repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments" \
            -f body="${BODY}" \
            --jq '.id')
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"
        shell: bash

  # Job 3: Run Claude with composed prompt
  claude-run:
    runs-on: diranged-claude-code
    needs: [detect-intent, setup]
    if: needs.detect-intent.outputs.should_run == 'true'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Claude
        uses: ./claude-respond
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
          assignee_trigger: "claude"
          label_trigger: "claude"
          allowed_bots: "claude[bot]"
          notify_owners: "diranged"
          compose_prompt: "true"
          agent_name: ${{ needs.detect-intent.outputs.agent }}
          model: ${{ needs.detect-intent.outputs.model }}
          issue_comment_id: ${{ needs.setup.outputs.comment_id }}
          allowed_tools: "Bash(*),Read,Glob,Grep,Edit,Write,WebFetch,WebSearch"

  # Job 4: Re-trigger developer when CI fails on a Claude-authored PR
  ci-retry:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'failure'
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Check Claude PR and retry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_RETRIES: "3"
        run: |
          set -euo pipefail

          # Get PR from workflow run
          PR_NUMBER=$(echo '${{ toJson(github.event.workflow_run.pull_requests) }}' | jq -r '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR associated with this workflow run"
            exit 0
          fi

          # Check if PR was authored by Claude
          PR_AUTHOR=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json author --jq '.author.login')
          case "$PR_AUTHOR" in
            *claude*|*\[bot\]*) ;;
            *)
              echo "PR #$PR_NUMBER not authored by Claude (author: $PR_AUTHOR), skipping"
              exit 0
              ;;
          esac

          # Find linked issue from PR body (looks for "Closes #N")
          ISSUE_NUMBER=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json body --jq '.body' | grep -oE 'Closes #[0-9]+' | head -1 | grep -oE '[0-9]+')
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No linked issue found in PR #$PR_NUMBER body"
            exit 0
          fi

          # Count commits as retry gauge
          COMMIT_COUNT=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json commits --jq '.commits | length')
          echo "PR #$PR_NUMBER has $COMMIT_COUNT commits (max retries: $MAX_RETRIES)"

          if [ "$COMMIT_COUNT" -gt "$MAX_RETRIES" ]; then
            echo "Exceeded max retries, escalating to humans"
            gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" \
              --body "CI has failed after $COMMIT_COUNT attempts on PR #$PR_NUMBER. Auto-fix limit reached. Human review needed.

          **Failed run:** ${{ github.event.workflow_run.html_url }}"
            exit 0
          fi

          # Post @claude comment to re-trigger the developer agent
          gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" \
            --body "@claude implement — CI failed on PR #$PR_NUMBER (attempt $COMMIT_COUNT/$MAX_RETRIES). Fix the failing checks.

          **Failed run:** ${{ github.event.workflow_run.html_url }}"
        shell: bash
