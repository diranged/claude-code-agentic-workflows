name: "Documentation Engineer"

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 8am UTC
  workflow_dispatch:
    inputs:
      force_rotation:
        description: 'Force dashboard issue rotation'
        type: boolean
        default: false

jobs:
  # Job 1: Find or create dashboard issue, set up tracking comment
  setup:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    outputs:
      issue_number: ${{ steps.dashboard.outputs.issue_number }}
      comment_id: ${{ steps.tracking.outputs.comment_id }}
      dashboard_age_days: ${{ steps.dashboard.outputs.age_days }}
    steps:
      - name: Find or create dashboard issue
        id: dashboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DASHBOARD_LABEL: "claude-engineer:docs"
        run: |
          # Find existing open dashboard issue
          ISSUE=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "$DASHBOARD_LABEL" \
            --state open \
            --json number,createdAt \
            --limit 1)

          if [ "$(echo "$ISSUE" | jq length)" -gt 0 ]; then
            ISSUE_NUMBER=$(echo "$ISSUE" | jq -r '.[0].number')
            CREATED_AT=$(echo "$ISSUE" | jq -r '.[0].createdAt')
            AGE_DAYS=$(( ( $(date +%s) - $(date -d "$CREATED_AT" +%s) ) / 86400 ))
          else
            # Ensure labels exist
            gh label create "$DASHBOARD_LABEL" \
              --repo "${{ github.repository }}" \
              --description "Documentation Engineer dashboard" \
              --color "0075ca" 2>/dev/null || true
            gh label create "claude-engineer:docs-task" \
              --repo "${{ github.repository }}" \
              --description "Work item from Documentation Engineer" \
              --color "c5def5" 2>/dev/null || true
            gh label create "claude:implement" \
              --repo "${{ github.repository }}" \
              --description "Trigger Claude implementation agent" \
              --color "5319e7" 2>/dev/null || true

            # Create dashboard issue
            ISSUE_NUMBER=$(gh issue create \
              --repo "${{ github.repository }}" \
              --title "Documentation Engineer Dashboard" \
              --label "$DASHBOARD_LABEL" \
              --body "Dashboard initializing on first run..." \
              --json number --jq '.number' 2>/dev/null || \
              gh issue create \
                --repo "${{ github.repository }}" \
                --title "Documentation Engineer Dashboard" \
                --label "$DASHBOARD_LABEL" \
                --body "Dashboard initializing on first run..." | grep -oP '#\K[0-9]+')
            AGE_DAYS=0
          fi

          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "age_days=$AGE_DAYS" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Create tracking comment
        id: tracking
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.dashboard.outputs.issue_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY="<!-- claude-tracking-comment -->"
          BODY="${BODY}"$'\n'"## Status: Initializing"
          BODY="${BODY}"$'\n\n'"**Run:** [View workflow run](${RUN_URL})"
          BODY="${BODY}"$'\n\n'"Documentation Engineer is starting up..."
          COMMENT_ID=$(gh api \
            --method POST \
            "/repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments" \
            -f body="${BODY}" \
            --jq '.id')
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"
        shell: bash

  # Job 2: Run the documentation engineer agent
  engineer-run:
    runs-on: diranged-claude-code
    needs: setup
    permissions:
      contents: write
      issues: write
      pull-requests: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Documentation Engineer
        uses: ./claude-respond
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          compose_prompt: "true"
          agent_name: "docs-engineer"
          model: "claude-sonnet-4-20250514"
          issue_comment_id: ${{ needs.setup.outputs.comment_id }}
          allowed_tools: "Bash(*),Read,Glob,Grep,WebFetch,WebSearch"
          prompt: |
            Dashboard Configuration:
            - Dashboard issue: #${{ needs.setup.outputs.issue_number }}
            - Dashboard label: claude-engineer:docs
            - Task label: claude-engineer:docs-task
            - Delegation label: claude:implement
            - Rotation days: 7
            - Dashboard age: ${{ needs.setup.outputs.dashboard_age_days }} days
            - Force rotation: ${{ github.event.inputs.force_rotation || 'false' }}
