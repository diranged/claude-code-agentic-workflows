name: "Claude Engineers"

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 8am UTC
  workflow_dispatch:
    inputs:
      force_rotation:
        description: 'Force dashboard issue rotation for all engineers'
        type: boolean
        default: false

jobs:
  docs-engineer:
    runs-on: diranged-claude-code
    permissions:
      contents: read
      issues: write
      pull-requests: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Documentation Engineer
        uses: ./claude-engineer
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          agent_name: "docs-engineer"
          model: "claude-sonnet-4-20250514"
          dashboard_label: "claude-engineer:docs"
          task_label: "claude-engineer:docs-task"
          force_rotation: ${{ github.event.inputs.force_rotation || 'false' }}
