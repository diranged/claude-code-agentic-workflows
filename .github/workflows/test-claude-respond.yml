name: "Test: Claude Respond"

on:
  # PR comment triggers — issue comments are handled by claude-issue.yml
  pull_request_review_comment:
    types: [created]

  # Dev trigger — works from any branch: gh workflow run "Test: Claude Respond" --ref <branch>
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt to send to Claude"
        required: false
        default: "Say hello and confirm you are working. Keep it to one sentence."

jobs:
  # Event-driven: @claude mentions in issues/PRs
  claude-respond:
    if: github.event_name != 'workflow_dispatch'
    runs-on: diranged-claude-code
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Claude Respond
        uses: ./claude-respond
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          max_turns: "5"

  # Manual dispatch: test from any branch without issues
  claude-respond-dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: diranged-claude-code
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Claude Respond
        uses: ./claude-respond
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          max_turns: "3"
          prompt: ${{ inputs.prompt }}
